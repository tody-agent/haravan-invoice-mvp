<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khách hàng — Haravan Invoice</title>
  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>window.HV_PAGE = { id: 'settings-customers', title: 'Khách hàng' };</script>
</head>
<body>
  <div class="hv-skip-link"><a href="#main-content">Chuyển đến nội dung</a></div>
  <aside class="hv-sidebar" aria-label="Điều hướng chính"></aside>
  <header class="hv-topbar" aria-label="Thanh công cụ"></header>
  <main class="hv-content" id="main-content">
    <div class="hv-content-max">

      <!-- HEADER -->
      <div class="hv-content-header">
        <div>
          <nav class="hv-breadcrumb" style="margin-bottom:4px">
            <a href="dashboard.html" style="color:var(--hv-text-secondary)">Cài đặt</a>
            <i class="ti ti-chevron-right" style="color:var(--hv-text-muted);font-size:12px"></i>
            <span style="color:var(--hv-text-primary);font-weight:500">Khách hàng</span>
          </nav>
          <h1>Quản lý khách hàng</h1>
        </div>
        <div class="hv-flex hv-gap-2">
          <button class="hv-btn hv-btn-secondary" onclick="importExcel()"><i class="ti ti-upload"></i> Import Excel</button>
          <button class="hv-btn hv-btn-secondary" onclick="exportExcel()"><i class="ti ti-download"></i> Export</button>
          <button class="hv-btn hv-btn-primary" onclick="showAddCustomerModal()"><i class="ti ti-plus"></i> Thêm khách hàng</button>
        </div>
      </div>

      <!-- SEARCH + FILTERS -->
      <div class="hv-card" style="margin-bottom:16px">
        <div style="padding:16px 20px">
          <div class="hv-flex hv-items-center hv-gap-3" style="margin-bottom:12px">
            <div style="position:relative;flex:1;max-width:400px">
              <i class="ti ti-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hv-text-muted);font-size:16px"></i>
              <input class="hv-input" id="customer-search" placeholder="Tìm theo mã, tên, MST, SĐT..." style="padding-left:36px">
            </div>
            <span style="font-size:13px;color:var(--hv-text-muted)" id="customer-count">8 khách hàng</span>
          </div>
          <div class="hv-filter-bar" style="margin-bottom:0">
            <span style="font-size:12px;color:var(--hv-text-muted);font-weight:500">Lọc:</span>
            <button class="hv-filter-chip active" data-filter="all" onclick="filterCustomers(this,'all')">Tất cả</button>
            <button class="hv-filter-chip" data-filter="type" onclick="filterCustomers(this,'type')"><i class="ti ti-building"></i> Loại KH</button>
            <button class="hv-filter-chip" data-filter="has-mst" onclick="filterCustomers(this,'has-mst')"><i class="ti ti-hash"></i> Có MST</button>
            <button class="hv-filter-chip" data-filter="region" onclick="filterCustomers(this,'region')"><i class="ti ti-map-pin"></i> Khu vực</button>
          </div>
        </div>
      </div>

      <!-- STATE: DEFAULT (Table) -->
      <div class="hv-state-default">
        <div class="hv-card hv-card-flush">
          <div class="hv-table-wrap">
            <table class="hv-table" id="customer-table">
              <thead>
                <tr>
                  <th style="width:40px"><input type="checkbox" class="hv-checkbox" id="select-all" onchange="toggleSelectAll(this)"></th>
                  <th>Mã KH</th>
                  <th>Tên khách hàng</th>
                  <th>MST</th>
                  <th>SĐT</th>
                  <th>Email</th>
                  <th>Loại</th>
                  <th style="width:100px">Thao tác</th>
                </tr>
              </thead>
              <tbody id="customer-tbody">
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div class="hv-flex hv-items-center hv-justify-between" style="margin-top:16px">
          <span style="font-size:13px;color:var(--hv-text-muted)">Hiển thị 1–8 của 8 khách hàng</span>
          <div class="hv-flex hv-gap-1">
            <button class="hv-btn hv-btn-sm hv-btn-tertiary" disabled><i class="ti ti-chevron-left"></i></button>
            <button class="hv-btn hv-btn-sm hv-btn-primary" style="min-width:30px">1</button>
            <button class="hv-btn hv-btn-sm hv-btn-tertiary" disabled><i class="ti ti-chevron-right"></i></button>
          </div>
        </div>
      </div>

      <!-- STATE: EMPTY -->
      <div class="hv-state-empty" style="display:none">
        <div class="hv-card" style="text-align:center;padding:64px 20px">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--hv-primary-soft);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
            <i class="ti ti-users" style="font-size:28px;color:var(--hv-primary)"></i>
          </div>
          <h3 style="font-size:16px;font-weight:600;margin-bottom:6px">Chưa có khách hàng nào</h3>
          <p style="color:var(--hv-text-secondary);font-size:14px;margin-bottom:20px">Bắt đầu bằng cách thêm khách hàng đầu tiên hoặc import từ Excel.</p>
          <div class="hv-flex hv-gap-2" style="justify-content:center">
            <button class="hv-btn hv-btn-secondary" onclick="importExcel()"><i class="ti ti-upload"></i> Import Excel</button>
            <button class="hv-btn hv-btn-primary" onclick="showAddCustomerModal()"><i class="ti ti-plus"></i> Thêm khách hàng</button>
          </div>
        </div>
      </div>

      <!-- STATE: LOADING -->
      <div class="hv-state-loading" style="display:none">
        <div class="hv-card">
          <div class="hv-skeleton-row" style="height:44px;margin-bottom:8px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px;margin-bottom:4px"></div>
          <div class="hv-skeleton-row" style="height:56px"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="assets/js/app-shell.js"></script>
  <script>
    /* ============================================
       CUSTOMER DATA
       ============================================ */
    const CUSTOMERS = [
      { code:'KH001', name:'Công ty TNHH Cà phê Trung Nguyên Legend', mst:'0312345678', phone:'028 3999 8888', email:'info@trungnguyen.com', type:'enterprise', address:'12 Nguyễn Văn Trí, P.7, Q.Phú Nhuận, TP.HCM', fax:'028 3999 8889', ccEmail:'', contactPerson:'Lê Tody', legalRep:'Đặng Lê Nguyên Vũ', bankAccount:'1234567890123', accountHolder:'Công ty TNHH Cà phê Trung Nguyên Legend', bankName:'Vietcombank', description:'Khách hàng VIP', invLookupAccount:'trungnguyen@einvoice.vn' },
      { code:'KH002', name:'CTCP Vàng bạc Đá quý DOJI', mst:'0100123456', phone:'024 3999 7777', email:'contact@doji.vn', type:'enterprise', address:'108 Trần Hưng Đạo, Q.Hoàn Kiếm, Hà Nội', fax:'024 3999 7778', ccEmail:'invoice@doji.vn', contactPerson:'Nguyễn Minh Tuấn', legalRep:'Đỗ Minh Phú', bankAccount:'9876543210987', accountHolder:'CTCP Vàng bạc Đá quý DOJI', bankName:'Techcombank', description:'', invLookupAccount:'doji@einvoice.vn' },
      { code:'KH003', name:'Hộ kinh doanh Nguyễn Văn An', mst:'8765432109', phone:'0901 234 567', email:'an@gmail.com', type:'individual', address:'45 Lê Lợi, Q.1, TP.HCM', fax:'', ccEmail:'', contactPerson:'Nguyễn Văn An', legalRep:'Nguyễn Văn An', bankAccount:'', accountHolder:'', bankName:'', description:'KH thường xuyên', invLookupAccount:'' },
      { code:'KH004', name:'Công ty TNHH Thế giới Di động', mst:'0309538432', phone:'028 3999 6666', email:'info@tgdđ.com', type:'enterprise', address:'128 Trần Quang Khải, Q.1, TP.HCM', fax:'028 3999 6667', ccEmail:'accounting@tgdđ.com', contactPerson:'Trần Kim Phượng', legalRep:'Nguyễn Đức Tài', bankAccount:'5555666677778', accountHolder:'Công ty TNHH Thế giới Di động', bankName:'ACB', description:'', invLookupAccount:'tgdđ@einvoice.vn' },
      { code:'KH005', name:'CTCP Sách Việt Nam (FAHASA)', mst:'0301312749', phone:'028 3999 5555', email:'contact@fahasa.com', type:'enterprise', address:'60-62 Lê Lợi, Q.1, TP.HCM', fax:'028 3999 5556', ccEmail:'', contactPerson:'Phạm Minh Tâm', legalRep:'Lê Hoàng', bankAccount:'1111222233334', accountHolder:'CTCP Sách Việt Nam', bankName:'BIDV', description:'Nhà sách lớn nhất VN', invLookupAccount:'fahasa@einvoice.vn' },
      { code:'KH006', name:'Công ty TNHH Samsung Electronics VN', mst:'0101234567', phone:'024 3999 4444', email:'samsung@Samsung.com', type:'enterprise', address:'KCN Yên Phong, Bắc Ninh', fax:'024 3999 4445', ccEmail:'vn-finance@samsung.com', contactPerson:'Park Ji Sung', legalRep:'Choi Joo Ho', bankAccount:'7777888899990', accountHolder:'Samsung Electronics Vietnam', bankName:'Shinhan Bank', description:'FDI customer', invLookupAccount:'samsung@einvoice.vn' },
      { code:'KH007', name:'Hộ kinh doanh Lê Thị Mai', mst:'5432109876', phone:'0912 345 678', email:'mai@gmail.com', type:'individual', address:'78 Nguyễn Đình Chiểu, Q.3, TP.HCM', fax:'', ccEmail:'', contactPerson:'Lê Thị Mai', legalRep:'Lê Thị Mai', bankAccount:'', accountHolder:'', bankName:'', description:'', invLookupAccount:'' },
      { code:'KH008', name:'Công ty TNHH Grab Việt Nam', mst:'0312398745', phone:'028 3999 3333', email:'grab@grab.com', type:'enterprise', address:'Tầng 9, TNR Tower, 180-192 Nguyễn Công Trứ, Q.1, TP.HCM', fax:'028 3999 3334', ccEmail:'vn-tax@grab.com', contactPerson:'Nguyễn Thanh Hà', legalRep:'Russell Cohen', bankAccount:'3333444455556', accountHolder:'Grab Vietnam Co. Ltd', bankName:'HSBC', description:'Platform partner', invLookupAccount:'grab@einvoice.vn' },
    ];

    let filteredCustomers = [...CUSTOMERS];

    /* ============================================
       RENDER TABLE
       ============================================ */
    function renderCustomerTable(data) {
      const tbody = document.getElementById('customer-tbody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:48px;color:var(--hv-text-muted)"><i class="ti ti-users-off" style="font-size:32px;display:block;margin-bottom:8px"></i>Không tìm thấy khách hàng nào</td></tr>';
        document.getElementById('customer-count').textContent = '0 khách hàng';
        return;
      }
      document.getElementById('customer-count').textContent = data.length + ' khách hàng';
      tbody.innerHTML = data.map(c => `
        <tr data-code="${c.code}">
          <td><input type="checkbox" class="hv-checkbox row-check" onchange="updateBulkBar()"></td>
          <td><span class="cell-id" style="cursor:pointer" onclick="viewCustomer('${c.code}')">${c.code}</span></td>
          <td>
            <div style="font-weight:500">${c.name}</div>
            ${c.contactPerson ? '<div style="font-size:12px;color:var(--hv-text-muted)">' + c.contactPerson + '</div>' : ''}
          </td>
          <td><span class="hv-mono" style="font-size:13px">${c.mst}</span></td>
          <td>${c.phone}</td>
          <td style="max-width:180px"><span class="hv-truncate" style="display:block">${c.email}</span></td>
          <td>${c.type === 'enterprise'
            ? '<span class="hv-badge hv-badge-primary hv-badge-solid"><i class="ti ti-building" style="font-size:11px"></i> Doanh nghiệp</span>'
            : '<span class="hv-badge hv-badge-neutral hv-badge-solid"><i class="ti ti-user" style="font-size:11px"></i> Cá nhân</span>'
          }</td>
          <td>
            <div class="hv-flex hv-gap-1">
              <button class="hv-btn hv-btn-sm hv-btn-tertiary hv-btn-icon" title="Xem" onclick="viewCustomer('${c.code}')"><i class="ti ti-eye"></i></button>
              <button class="hv-btn hv-btn-sm hv-btn-tertiary hv-btn-icon" title="Sửa" onclick="editCustomer('${c.code}')"><i class="ti ti-pencil"></i></button>
              <button class="hv-btn hv-btn-sm hv-btn-tertiary hv-btn-icon" title="Xóa" onclick="deleteCustomer('${c.code}')"><i class="ti ti-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    /* ============================================
       SEARCH
       ============================================ */
    document.getElementById('customer-search').addEventListener('input', function() {
      const q = this.value.toLowerCase().trim();
      filteredCustomers = CUSTOMERS.filter(c =>
        !q || c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q) || c.mst.includes(q) || c.phone.includes(q) || c.email.toLowerCase().includes(q)
      );
      renderCustomerTable(filteredCustomers);
    });

    /* ============================================
       FILTER CHIPS
       ============================================ */
    function filterCustomers(btn, type) {
      document.querySelectorAll('.hv-filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      if (type === 'all') {
        filteredCustomers = [...CUSTOMERS];
      } else if (type === 'type') {
        filteredCustomers = CUSTOMERS.filter(c => c.type === 'enterprise');
      } else if (type === 'has-mst') {
        filteredCustomers = CUSTOMERS.filter(c => c.mst.length >= 10);
      } else if (type === 'region') {
        filteredCustomers = CUSTOMERS.filter(c => c.address.toLowerCase().includes('hà nội') || c.address.toLowerCase().includes('bắc ninh'));
      }
      renderCustomerTable(filteredCustomers);
    }

    /* ============================================
       SELECT ALL
       ============================================ */
    function toggleSelectAll(master) {
      document.querySelectorAll('.row-check').forEach(cb => cb.checked = master.checked);
      updateBulkBar();
    }
    function updateBulkBar() {
      const checked = document.querySelectorAll('.row-check:checked').length;
      let bar = document.getElementById('bulk-bar');
      if (checked > 0) {
        if (!bar) {
          bar = document.createElement('div');
          bar.id = 'bulk-bar';
          bar.className = 'hv-bulk-bar';
          bar.innerHTML = `
            <span class="hv-bulk-count"><span id="bulk-count-num">0</span> khách hàng được chọn</span>
            <div class="hv-bulk-actions">
              <button class="hv-bulk-btn" onclick="exportSelected()"><i class="ti ti-download"></i> Export</button>
              <button class="hv-bulk-btn" onclick="bulkDelete()"><i class="ti ti-trash"></i> Xóa</button>
            </div>
          `;
          document.querySelector('.hv-content-max').insertBefore(bar, document.querySelector('.hv-state-default'));
        }
        document.getElementById('bulk-count-num').textContent = checked;
      } else if (bar) {
        bar.remove();
      }
    }

    /* ============================================
       VIEW CUSTOMER (Drawer)
       ============================================ */
    function viewCustomer(code) {
      const c = CUSTOMERS.find(x => x.code === code);
      if (!c) return;
      HV.openDrawer({
        title: c.name,
        tabs: [
          { id: 'info', label: 'Thông tin' },
          { id: 'invoices', label: 'Lịch sử hóa đơn' },
        ],
        sections: [
          {
            tab: 'info', title: 'Thông tin cơ bản',
            rows: [
              { label: 'Mã khách hàng', value: c.code },
              { label: 'Mã số thuế', value: c.mst || '—', mono: true },
              { label: 'Tên khách hàng', value: c.name },
              { label: 'Loại khách hàng', value: c.type === 'enterprise' ? 'Doanh nghiệp' : 'Cá nhân' },
              { label: 'Tài khoản tra cứu HĐ', value: c.invLookupAccount || '—', mono: true },
              { label: 'Địa chỉ', value: c.address },
              { label: 'Điện thoại', value: c.phone },
              { label: 'Fax', value: c.fax || '—' },
            ]
          },
          {
            tab: 'info', title: 'Thông tin liên hệ',
            rows: [
              { label: 'Email', value: c.email },
              { label: 'CC Email', value: c.ccEmail || '—' },
              { label: 'Người liên hệ', value: c.contactPerson || '—' },
              { label: 'Đại diện pháp luật', value: c.legalRep || '—' },
            ]
          },
          {
            tab: 'info', title: 'Thông tin ngân hàng',
            rows: [
              { label: 'Số tài khoản', value: c.bankAccount || '—', mono: true },
              { label: 'Chủ tài khoản', value: c.accountHolder || '—' },
              { label: 'Ngân hàng', value: c.bankName || '—' },
            ]
          },
          {
            tab: 'info', title: 'Khác',
            rows: [
              { label: 'Ghi chú', value: c.description || '—' },
            ]
          },
          {
            tab: 'invoices', title: 'Hóa đơn gần đây',
            rows: [
              { label: 'Tổng hóa đơn', value: '12' },
              { label: 'Tổng giá trị', value: '45.600.000đ' },
              { label: 'Hóa đơn cuối', value: '15/05/2026' },
            ]
          },
        ],
        footer: `
          <button class="hv-btn hv-btn-secondary" onclick="HV.closeDrawer()"><i class="ti ti-x"></i> Đóng</button>
          <button class="hv-btn hv-btn-primary" onclick="HV.closeDrawer();editCustomer('${c.code}')"><i class="ti ti-pencil"></i> Chỉnh sửa</button>
        `
      });
    }

    /* ============================================
       ADD / EDIT CUSTOMER MODAL
       ============================================ */
    function showAddCustomerModal(prefill) {
      const p = prefill || {};
      const isEdit = !!prefill;
      const body = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div>
            <label class="hv-label">Mã khách hàng <span style="color:var(--hv-danger)">*</span></label>
            <input class="hv-input" id="f-code" value="${p.code || ''}" placeholder="VD: KH009" ${isEdit ? 'readonly style="background:var(--hv-bg-soft)"' : ''}>
          </div>
          <div>
            <label class="hv-label">Mã số thuế</label>
            <div style="position:relative">
              <input class="hv-input hv-mono" id="f-mst" value="${p.mst || ''}" placeholder="Nhập MST (10 hoặc 13 số)" maxlength="13" oninput="onMstInput(this)">
              <div id="mst-lookup-spinner" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%)">
                <div style="width:16px;height:16px;border:2px solid var(--hv-border);border-top-color:var(--hv-primary);border-radius:50%;animation:hv-spin 800ms linear infinite"></div>
              </div>
            </div>
            <div class="hv-help-text" id="mst-hint">Nhập 10 hoặc 13 số để tự động tra cứu</div>
          </div>
          <div style="grid-column:1/-1">
            <label class="hv-label">Tên khách hàng <span style="color:var(--hv-danger)">*</span></label>
            <input class="hv-input" id="f-name" value="${p.name || ''}" placeholder="Tên công ty / hộ kinh doanh">
          </div>
          <div style="grid-column:1/-1">
            <label class="hv-label">Tài khoản tra cứu hóa đơn</label>
            <input class="hv-input" id="f-invlookup" value="${p.invLookupAccount || ''}" placeholder="Tài khoản trên hệ thống tra cứu HĐ">
          </div>
          <div style="grid-column:1/-1">
            <label class="hv-label">Địa chỉ</label>
            <input class="hv-input" id="f-address" value="${p.address || ''}" placeholder="Địa chỉ chi tiết">
          </div>
          <div>
            <label class="hv-label">Điện thoại</label>
            <input class="hv-input" id="f-phone" value="${p.phone || ''}" placeholder="Số điện thoại">
          </div>
          <div>
            <label class="hv-label">Fax</label>
            <input class="hv-input" id="f-fax" value="${p.fax || ''}" placeholder="Số fax">
          </div>
          <div>
            <label class="hv-label">Email <span style="font-size:11px;color:var(--hv-text-muted)">(phân cách bằng ;)</span></label>
            <input class="hv-input" id="f-email" value="${p.email || ''}" placeholder="email1@example.com; email2@example.com">
          </div>
          <div>
            <label class="hv-label">CC Email</label>
            <input class="hv-input" id="f-ccemail" value="${p.ccEmail || ''}" placeholder="cc@example.com">
          </div>
          <div>
            <label class="hv-label">Người liên hệ</label>
            <input class="hv-input" id="f-contact" value="${p.contactPerson || ''}" placeholder="Họ tên người liên hệ">
          </div>
          <div>
            <label class="hv-label">Đại diện pháp luật</label>
            <input class="hv-input" id="f-legalrep" value="${p.legalRep || ''}" placeholder="Tên đại diện pháp luật">
          </div>
          <div>
            <label class="hv-label">Số tài khoản ngân hàng</label>
            <input class="hv-input hv-mono" id="f-bankaccount" value="${p.bankAccount || ''}" placeholder="Số TK">
          </div>
          <div>
            <label class="hv-label">Chủ tài khoản</label>
            <input class="hv-input" id="f-accountholder" value="${p.accountHolder || ''}" placeholder="Tên chủ TK">
          </div>
          <div style="grid-column:1/-1">
            <label class="hv-label">Ngân hàng</label>
            <input class="hv-input" id="f-bankname" value="${p.bankName || ''}" placeholder="Tên ngân hàng">
          </div>
          <div style="grid-column:1/-1">
            <label class="hv-label">Loại khách hàng</label>
            <select class="hv-select" id="f-type">
              <option value="enterprise" ${p.type === 'enterprise' ? 'selected' : ''}>Doanh nghiệp (Đơn vị kế toán)</option>
              <option value="individual" ${p.type === 'individual' ? 'selected' : ''}>Cá nhân</option>
            </select>
          </div>
          <div style="grid-column:1/-1">
            <label class="hv-label">Ghi chú</label>
            <textarea class="hv-textarea" id="f-desc" rows="2" placeholder="Ghi chú thêm...">${p.description || ''}</textarea>
          </div>
        </div>
      `;
      HV.modal({
        title: isEdit ? 'Sửa khách hàng' : 'Thêm khách hàng mới',
        body: body,
        size: 'lg',
        actions: [
          { id: 'cancel', label: 'Hủy' },
          { id: 'save', label: isEdit ? 'Cập nhật' : 'Tạo mới', primary: true, onClick: () => {
            const code = document.getElementById('f-code').value.trim();
            const name = document.getElementById('f-name').value.trim();
            if (!code) { HV.toast('Vui lòng nhập mã khách hàng','warning'); return; }
            if (!name) { HV.toast('Vui lòng nhập tên khách hàng','warning'); return; }
            HV.toast(isEdit ? 'Đã cập nhật khách hàng' : 'Đã tạo khách hàng mới','success');
            document.querySelector('.hv-backdrop').click();
          }}
        ]
      });
    }

    function editCustomer(code) {
      const c = CUSTOMERS.find(x => x.code === code);
      if (c) showAddCustomerModal(c);
    }

    /* ============================================
       MST LOOKUP SIMULATION
       ============================================ */
    let mstTimer = null;
    function onMstInput(input) {
      clearTimeout(mstTimer);
      const val = input.value.replace(/\D/g, '');
      input.value = val;
      const spinner = document.getElementById('mst-lookup-spinner');
      const hint = document.getElementById('mst-hint');

      if (val.length === 10 || val.length === 13) {
        hint.textContent = 'Đang tra cứu MST...';
        hint.style.color = 'var(--hv-primary)';
        spinner.style.display = 'block';
        mstTimer = setTimeout(() => {
          const mockData = {
            '0312345678': { name: 'Công ty TNHH Cà phê Trung Nguyên Legend', address: '12 Nguyễn Văn Trí, P.7, Q.Phú Nhuận, TP.HCM' },
            '0100123456': { name: 'CTCP Vàng bạc Đá quý DOJI', address: '108 Trần Hưng Đạo, Q.Hoàn Kiếm, Hà Nội' },
            '0309538432': { name: 'Công ty TNHH Thế giới Di động', address: '128 Trần Quang Khải, Q.1, TP.HCM' },
            '0301312749': { name: 'CTCP Sách Việt Nam (FAHASA)', address: '60-62 Lê Lợi, Q.1, TP.HCM' },
            '0101234567': { name: 'Công ty TNHH Samsung Electronics Việt Nam', address: 'KCN Yên Phong, Bắc Ninh' },
            '0312398745': { name: 'Công ty TNHH Grab Việt Nam', address: 'Tầng 9, TNR Tower, 180-192 Nguyễn Công Trứ, Q.1, TP.HCM' },
          };
          spinner.style.display = 'none';
          if (mockData[val]) {
            document.getElementById('f-name').value = mockData[val].name;
            document.getElementById('f-address').value = mockData[val].address;
            hint.innerHTML = '<i class="ti ti-circle-check" style="color:var(--hv-success);font-size:12px"></i> Tra cứu thành công — đã tự động điền tên và địa chỉ';
            hint.style.color = 'var(--hv-success)';
          } else {
            hint.innerHTML = '<i class="ti ti-info-circle" style="font-size:12px"></i> Không tìm thấy thông tin MST. Vui lòng nhập thủ công.';
            hint.style.color = 'var(--hv-text-muted)';
          }
        }, 1000);
      } else if (val.length > 0) {
        hint.textContent = 'MST phải có 10 hoặc 13 chữ số';
        hint.style.color = 'var(--hv-warning)';
        spinner.style.display = 'none';
      } else {
        hint.textContent = 'Nhập 10 hoặc 13 số để tự động tra cứu';
        hint.style.color = 'var(--hv-text-muted)';
        spinner.style.display = 'none';
      }
    }

    /* ============================================
       DELETE CUSTOMER
       ============================================ */
    function deleteCustomer(code) {
      const c = CUSTOMERS.find(x => x.code === code);
      if (!c) return;
      HV.confirm(`Bạn có chắc muốn xóa khách hàng <strong>${c.name}</strong>?<br>Hành động này không thể hoàn tác.`, {
        title: 'Xóa khách hàng',
        confirmLabel: 'Xóa',
        type: 'danger'
      }).then(yes => {
        if (yes) HV.toast('Đã xóa khách hàng ' + code, 'success');
      });
    }

    function bulkDelete() {
      const count = document.querySelectorAll('.row-check:checked').length;
      HV.confirm(`Bạn có chắc muốn xóa ${count} khách hàng đã chọn?`, {
        title: 'Xóa hàng loạt',
        confirmLabel: 'Xóa ' + count + ' KH',
        type: 'danger'
      }).then(yes => {
        if (yes) {
          HV.toast('Đã xóa ' + count + ' khách hàng', 'success');
          document.getElementById('bulk-bar')?.remove();
          document.getElementById('select-all').checked = false;
        }
      });
    }

    /* ============================================
       IMPORT / EXPORT
       ============================================ */
    function importExcel() {
      HV.modal({
        title: 'Import khách hàng từ Excel',
        body: `
          <div style="text-align:center;padding:20px 0">
            <div style="width:64px;height:64px;border-radius:var(--hv-radius-lg);background:var(--hv-success-soft);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
              <i class="ti ti-file-spreadsheet" style="font-size:28px;color:var(--hv-success)"></i>
            </div>
            <h3 style="font-size:15px;font-weight:600;margin-bottom:6px">Tải lên file Excel</h3>
            <p style="font-size:13px;color:var(--hv-text-secondary);margin-bottom:16px">Hỗ trợ .zip, .xml, .xls. Tối đa 100MB.</p>
            <div style="border:2px dashed var(--hv-border);border-radius:var(--hv-radius-lg);padding:32px;cursor:pointer" onclick="document.getElementById('import-file').click()">
              <i class="ti ti-cloud-upload" style="font-size:32px;color:var(--hv-text-muted);display:block;margin-bottom:8px"></i>
              <span style="font-size:13px;color:var(--hv-text-secondary)">Kéo thả file hoặc <span style="color:var(--hv-primary);font-weight:500">chọn file</span></span>
            </div>
            <input type="file" id="import-file" accept=".zip,.xml,.xls,.xlsx" style="display:none">
            <div style="margin-top:12px">
              <a href="#" style="font-size:12px;color:var(--hv-primary)"><i class="ti ti-download" style="font-size:12px"></i> Tải file mẫu (.xlsx)</a>
            </div>
          </div>
        `,
        actions: [
          { id: 'cancel', label: 'Hủy' },
          { id: 'import', label: 'Import', primary: true, onClick: (bd) => { HV.closeModal(bd); HV.toast('Đang import... (demo)','info'); } }
        ]
      });
    }

    function exportExcel() {
      HV.toast('Đang xuất file Excel... (demo)', 'info');
    }

    function exportSelected() {
      const count = document.querySelectorAll('.row-check:checked').length;
      HV.toast('Đang xuất ' + count + ' khách hàng... (demo)', 'info');
    }

    /* ============================================
       INIT
       ============================================ */
    renderCustomerTable(CUSTOMERS);
  </script>
</body>
</html>
